<div class="feed-container">
  <app-feed-navbar></app-feed-navbar>

  <header class="feed-header">
    <div class="feed-welcome">
      <h1>Bienvenido a tu feed</h1>
      <p *ngIf="user">Hola, {{ user.name }}. Aquí están tus videos recomendados.</p>
      <p *ngIf="!user">Inicia sesión para ver contenido personalizado.</p>
    </div>
  </header>

  <p class="error" *ngIf="instagramError">No se pudo cargar el feed de Instagram. Intenta más tarde.</p>

  <section class="video-list">
    <article class="video-card" *ngFor="let video of videos; let i = index">
      <div class="video-media">
        <ng-container *ngIf="video.isVideo; else imageTpl">
          <video
            class="feed-video"
            [src]="video.url"
            controls
            autoplay
            muted
            playsinline
            (ended)="nextVideo()"
          ></video>
        </ng-container>
        <ng-template #imageTpl>
          <img class="feed-image" [src]="video.url" alt="{{ video.description || 'image' }}" />
        </ng-template>
      </div>

      <div class="video-info">
        <div class="video-topline">
          <span class="video-index">Video {{ i + 1 }}</span>
          <a [routerLink]="['/perfil-profesional', video.professionalId]" class="video-source">
            {{ video.professionalName }}
          </a>
        </div>
        <h2>{{ video.description }}</h2>
        <div class="tags">
          <span *ngFor="let tag of video.tags">#{{ tag }}</span>
        </div>
      </div>
    </article>
  </section>
</div>
