<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Inicia sesión</h2>
      <p>Accede a tu cuenta de SerenaMente</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <!-- Email -->
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          id="email"
          type="email"
          autocomplete="email"
          formControlName="email"
          placeholder="nombre@ejemplo.com"
          [class.invalid]="email.invalid && (email.dirty || email.touched)"
          required
        >
        <div *ngIf="email.invalid && (email.dirty || email.touched)" class="error-message">
          <span *ngIf="email.errors?.['required']">El correo es requerido.</span>
          <span *ngIf="email.errors?.['email']">Formato de correo inválido.</span>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Contraseña</label>

        <div class="password-input-wrapper">
          <input
            id="password"
            [type]="passwordVisible ? 'text' : 'password'"
            autocomplete="current-password"
            formControlName="password"
            placeholder="••••••••"
            [class.invalid]="password.invalid && (password.dirty || password.touched)"
            required
          >
          <button type="button" class="visibility-toggle" (click)="togglePasswordVisibility()">
            {{ passwordVisible ? 'Ocultar' : 'Mostrar' }}
          </button>
        </div>

        <div *ngIf="password.invalid && (password.dirty || password.touched)" class="error-message">
          <span *ngIf="password.errors?.['required']">Se requiere la contraseña.</span>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="loginForm.invalid" class="btn-submit">Entrar</button>
      </div>

    </form>

    <div class="login-footer">
      <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
    </div>
  </div>
</div>
